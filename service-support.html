<h1>更新サポート</h1>

ホームページ公開後の文章修正や画像追加など

</p>

<h2>更新サポート内容</h2>

<ul>
<li>文章の変更・追加</li>

</ul>

<a href="index.html#contact" class="btn">
お問い合わせ
</a>

</section>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

particlesJS("particles-js",{

particles:{
number:{value:140},

color:{value:"#00bcd4"},

shape:{type:"circle"},

opacity:{value:0.6},

size:{value:2},

line_linked:{
enable:true,
distance:200,
color:"#00bcd4",
opacity:0.5,
width:1
},

move:{
enable:true,
speed:0.7
}

},

interactivity:{
events:{
onhover:{
enable:true,
mode:"repulse"
},
onclick:{
enable:true,
mode:"push"
}
},

modes:{
repulse:{
distance:80,
duration:0.3
},
push:{
particles_nb:3
}
}

},

retina_detect:true

});

</script>

<script>

const fades = document.querySelectorAll(".fade-text");

function reveal(){

fades.forEach(el => {

const position = el.getBoundingClientRect().top;
const screen = window.innerHeight;

if(position < screen - 100){
el.classList.add("show");
}

});

}

window.addEventListener("scroll", reveal);

reveal();  

</script>

</body>
